<ion-header class="doceria-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Endereço</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="doceria-content doceria-page">
  <section class="page-block">
    <div class="page-icon">
      <ion-icon name="location"></ion-icon>
    </div>
    <h1>Onde estamos</h1>
    <p class="lead">Venha nos visitar ou retire sua encomenda.</p>

    <div class="address-card">
      <p><strong>Doce Lar Doceria</strong></p>
      <p>Rua das Flores, 123 – Centro</p>
      <p>CEP 00000-000 – Sua Cidade / UF</p>
      <p class="horario"><strong>Horário:</strong> Seg a Sáb, 9h às 19h</p>
    </div>

    <p class="obs">Consulte horários de funcionamento em feriados. Encomendas com antecedência.</p>
  </section>
</ion-content>
